<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>STATS – Multi joueurs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Stats Basket" />
  <meta name="theme-color" content="#080d18" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#f0ede8;
      --surf:#ffffff;
      --surf2:#f7f5f2;
      --surf3:#e8e4de;
      --line:rgba(30,41,59,.12);
      --txt:#1e293b;
      --muted:#64748b;
      --acc:#f97316;
      --amber:#d97706;
      --green:#16a34a;
      --green2:#22c55e;
      --red:#ef4444;
      --blue:#0284c7;
      --purple:#7c3aed;
      --pink:#db2777;
      --teal:#0d9488;
      --shadow:0 4px 20px rgba(30,41,59,.10);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html, body, #root { width:100%; height:100%; overflow:hidden; }
    body {
      background:var(--bg);
      color:var(--txt);
      font-family:'Barlow', sans-serif;
      -webkit-font-smoothing:antialiased;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }
    input, button, select { font:inherit; }
    button { cursor:pointer; }
    .app {
      width:100%; height:100%; display:flex; flex-direction:column;
      padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
      background:linear-gradient(180deg,#f0ede8 0%, #e8e4de 100%);
    }
    .topbar {
      background:#ffffff;
      border-bottom:3px solid #1e293b;
      padding:8px 10px;
      display:flex; gap:10px; align-items:center;
    }
    .logo {
      color:#1e293b; font-family:'Barlow Condensed', sans-serif; font-weight:900; letter-spacing:.06em; font-size:1.15rem;
      white-space:nowrap;
    }
    .topbar-fields { display:flex; gap:8px; flex:1; align-items:center; }
    .topbar input {
      height:34px; background:#f7f5f2; border:1px solid rgba(30,41,59,.18); color:#1e293b;
      border-radius:8px; outline:none; padding:0 10px; min-width:0;
    }
    .topbar input::placeholder { color:#94a3b8; }
    .topbar input:focus, .timer-zone select:focus { border-color:var(--acc); }
    .inp-teams { flex:1 1 280px; }
    .inp-date { width:145px; }
    .inp-score { width:110px; }
    .timer-zone { display:flex; align-items:center; gap:6px; margin-left:auto; }
    .timer-zone select, .timer-box, .timer-btn {
      height:34px; border-radius:8px; border:1px solid rgba(30,41,59,.18); background:#f7f5f2; color:#1e293b;
    }
    .timer-zone select { padding:0 8px; outline:none; font-family:'Barlow Condensed', sans-serif; font-weight:700; }
    .timer-box {
      min-width:92px; display:flex; align-items:center; justify-content:center;
      font-family:'Barlow Condensed', sans-serif; font-size:1.3rem; font-weight:800;
    }
    .timer-btn {
      padding:0 12px; font-family:'Barlow Condensed', sans-serif; font-weight:700;
    }
    .timer-btn.play { background:rgba(22,163,74,.14); border-color:rgba(22,163,74,.35); color:#15803d; }
    .timer-btn.pause { background:rgba(239,68,68,.12); border-color:rgba(239,68,68,.3); color:#dc2626; }

    .score-strip {
      background:#1e293b;
      padding:6px 10px;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      min-height:52px;
    }
    .strip-main { display:flex; gap:14px; align-items:flex-end; }
    .strip-title { font-family:'Barlow Condensed', sans-serif; font-size:.68rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; opacity:.65; color:#fff; }
    .strip-score { font-family:'Barlow Condensed', sans-serif; font-size:2.15rem; font-weight:900; line-height:1; color:#fff; }
    .strip-player { font-family:'Barlow Condensed', sans-serif; font-size:.9rem; opacity:.88; padding-bottom:4px; color:#fff; }
    .strip-minis { display:flex; gap:12px; }
    .mini { text-align:center; min-width:34px; }
    .mini-v { font-family:'Barlow Condensed', sans-serif; font-size:1rem; font-weight:900; line-height:1; color:#fff; }
    .mini-l { font-family:'Barlow Condensed', sans-serif; font-size:.58rem; letter-spacing:.06em; text-transform:uppercase; color:rgba(255,255,255,.6); }

    .content {
      flex:1; min-height:0; display:grid; grid-template-columns:minmax(620px, 1.2fr) minmax(400px, .95fr); gap:10px;
      padding:10px;
    }
    .left-panel, .right-panel {
      min-height:0; display:flex; flex-direction:column; gap:12px;
    }
    .stats-wrap {
      flex:1; min-height:0; display:flex; align-items:flex-start; justify-content:flex-start;
      background:#ffffff; border:1px solid rgba(30,41,59,.10); border-radius:20px; padding:10px; box-shadow:var(--shadow);
      overflow:hidden;
    }
    .stats-grid {
      width:min(100%, 820px);
      display:grid; grid-template-columns:repeat(4, minmax(120px, 1fr)); gap:10px;
      align-content:start;
    }
    .stat-card {
      background:#ffffff;
      border:1px solid rgba(30,41,59,.10); border-radius:18px; padding:10px; min-height:150px; position:relative; overflow:hidden;
      box-shadow:0 2px 12px rgba(30,41,59,.07);
    }
    .stat-card:hover {
      box-shadow:0 4px 20px rgba(30,41,59,.13);
    }
    .stat-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
      background:var(--accent, var(--amber)); opacity:1;
      border-radius:18px 18px 0 0;
    }
    .stat-shoot {
      min-height:150px;
      display:flex; flex-direction:column; align-items:stretch;
    }
    .stat-title {
      text-align:center; color:var(--accent); font-family:'Barlow Condensed', sans-serif; font-size:1rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase;
      margin-top:0;
    }
    .stat-value {
      margin-top:3px; text-align:center; font-family:'Barlow Condensed', sans-serif; font-size:1.85rem; font-weight:900; line-height:1; color:#1e293b;
    }
    .stat-sub {
      margin-top:4px; text-align:center; color:var(--muted); font-family:'Barlow Condensed', sans-serif; font-size:.72rem;
    }
    .shoot-actions {
      order:10;
      margin-top:auto;
      display:grid; grid-template-columns:1fr 1fr; gap:8px;
      width:100%;
    }
    .shoot-btn {
      height:48px; border-radius:14px; border:1px solid rgba(30,41,59,.14); background:#f7f5f2; color:#1e293b;
      font-family:'Barlow Condensed', sans-serif; font-size:1.95rem; font-weight:900;
    }
    .shoot-btn:active { transform:scale(.97); }
    .shoot-btn.plus { background:color-mix(in srgb, var(--accent) 18%, rgba(255,255,255,.03)); }
    .shoot-btn.minus { background:rgba(255,255,255,.04); }

    .stat-icon {
      width:126px; height:96px; position:absolute; left:50%; top:54px; transform:translateX(-50%);
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }
    .stat-shoot .stat-icon {
      order:1;
      position:static;
      left:auto;
      top:auto;
      transform:none;
      width:92px;
      height:58px;
      margin:6px auto 2px;
    }
    .stat-shoot .stat-title { order:2; }
    .stat-shoot .stat-value { order:3; }
    .stat-shoot .stat-sub { order:4; margin-bottom:8px; }
    .stat-icon img, .compact-visual img {
      width:100%; height:100%; object-fit:contain; display:block;
      pointer-events:none;
    }
    .stat-card.compact {
      min-height:150px;
      display:flex;
      flex-direction:column;
    }
    .compact-visual {
      height:60px; width:100px; margin:4px auto 0; display:flex; align-items:center; justify-content:center;
      flex:0 0 auto;
    }
    .compact-grid { margin-top:auto; display:grid; gap:8px; }
    .compact-grid.two-cols { grid-template-columns:1fr 1fr; }
    .compact-btn {
      height:48px; border-radius:14px; border:1px solid rgba(30,41,59,.14); background:#f7f5f2; color:#1e293b;
      display:flex; align-items:center; justify-content:center; gap:8px;
      font-family:'Barlow Condensed', sans-serif; font-size:.95rem; font-weight:800; letter-spacing:.03em;
    }
    .compact-btn.single { height:48px; }
    .compact-btn:active { transform:scale(.98); }
    .compact-btn span:last-child { font-size:1.55rem; font-weight:900; }
    .selected-banner {
      background:#ffffff; border:1px solid rgba(30,41,59,.10); border-radius:16px; padding:9px 12px;
      display:flex; align-items:center; justify-content:space-between; gap:8px;
      box-shadow:0 2px 8px rgba(30,41,59,.06);
      flex:0 0 auto;
    }
    .selected-label { color:var(--muted); font-size:.85rem; }
    .selected-name { font-family:'Barlow Condensed', sans-serif; font-weight:800; font-size:1.15rem; }
    .selected-help { color:var(--muted); font-size:.78rem; text-align:right; }

    .right-panel-box {
      flex:1; min-height:0; background:#ffffff; border:1px solid rgba(30,41,59,.10); border-radius:20px; padding:12px; box-shadow:0 2px 12px rgba(30,41,59,.07);
      display:flex; flex-direction:column; gap:10px;
    }
    .panel-title {
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      font-family:'Barlow Condensed', sans-serif; font-size:1rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase;
    }
    .panel-title small { color:var(--muted); font-size:.76rem; font-weight:600; letter-spacing:0; text-transform:none; }
    .jerseys-grid {
      flex:1; min-height:0; overflow:auto; display:grid; grid-template-columns:repeat(3,minmax(118px,1fr)); gap:12px; padding-right:4px;
    }
    .jersey-card {
      background:#f7f5f2; border:1px solid rgba(30,41,59,.10); border-radius:18px; padding:10px; cursor:pointer; position:relative;
      transition:transform .1s ease, border-color .12s ease, background .12s ease;
      display:flex; flex-direction:column;
    }
    .jersey-card.selected {
      border-color:var(--acc); background:rgba(249,115,22,.06); box-shadow:0 0 0 2px rgba(249,115,22,.2) inset;
    }
    .jersey-card.on-court {
      border-color:rgba(22,163,74,.4);
      box-shadow:0 0 0 2px rgba(22,163,74,.12) inset;
    }
    .jersey-card.selected.on-court {
      box-shadow:0 0 0 2px rgba(249,115,22,.2) inset, 0 0 0 1px rgba(22,163,74,.25);
    }
    .jersey-card:active { transform:scale(.98); }
    .jersey-svg-wrap { position:relative; margin-top:24px; margin-bottom:6px; z-index:1; }
    .jersey-svg { width:100%; height:104px; display:block; }
    .jersey-number {
      position:absolute; top:34px; left:50%; transform:translateX(-50%);
      font-family:'Barlow Condensed', sans-serif; font-size:2rem; font-weight:900; color:#1e293b;
      pointer-events:none; letter-spacing:.02em; line-height:1; min-width:34px; text-align:center;
    }
    .jersey-name-on-shirt {
      position:absolute; top:66px; left:50%; transform:translateX(-50%); width:68px;
      font-family:'Barlow Condensed', sans-serif; font-size:.72rem; font-weight:800; color:#1e293b;
      pointer-events:none; text-align:center; text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:.02em;
    }
    .jersey-input, .jersey-name {
      width:100%; height:30px; border:none; border-bottom:1px solid rgba(30,41,59,.18); background:transparent; color:#1e293b;
      padding:0 4px; outline:none; text-align:center; border-radius:0;
    }
    .jersey-input::placeholder, .jersey-name::placeholder { color:#94a3b8; }
    .jersey-input:focus, .jersey-name:focus { border-bottom-color:var(--acc); }
    .jersey-input { margin-top:0; font-family:'Barlow Condensed', sans-serif; font-size:1.05rem; font-weight:800; }
    .jersey-name { margin-top:4px; font-size:.84rem; }
    .jersey-badge {
      position:absolute; top:8px; right:8px; min-width:24px; height:24px; border-radius:999px; background:rgba(30,41,59,.08); color:#1e293b;
      display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed', sans-serif; font-weight:900; font-size:.9rem;
    }
    .jersey-card.selected .jersey-badge { background:var(--acc); color:#fff; }
    .jersey-status {
      position:absolute; top:8px; left:8px; display:flex; flex-direction:column; gap:4px;
      z-index:4; width:max-content;
    }
    .jersey-status-btn {
      height:24px; min-width:34px; padding:0 8px; border-radius:999px; border:1px solid rgba(30,41,59,.15);
      background:rgba(30,41,59,.06); color:var(--muted); display:flex; align-items:center; justify-content:center;
      font-family:'Barlow Condensed', sans-serif; font-size:.76rem; font-weight:800; letter-spacing:.04em;
      position:relative; z-index:5; pointer-events:auto;
    }
    .jersey-status-btn.on.active { background:rgba(22,163,74,.14); border-color:rgba(22,163,74,.35); color:#15803d; }
    .jersey-status-btn.off.active { background:rgba(239,68,68,.12); border-color:rgba(239,68,68,.3); color:#dc2626; }
    .jersey-status-btn.on.active { background:rgba(34,197,94,.18); border-color:rgba(34,197,94,.35); color:#86efac; }
    .jersey-status-btn.off.active { background:rgba(239,68,68,.16); border-color:rgba(239,68,68,.3); color:#fca5a5; }
    .jersey-time {
      margin-top:6px; text-align:center; font-family:'Barlow Condensed', sans-serif; font-size:.9rem; font-weight:800; color:#334155;
    }
    .jersey-time-label { color:var(--muted); font-size:.72rem; margin-right:4px; }

    .template-tools { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .template-btn {
      height:34px; border-radius:9px; border:1px solid rgba(30,41,59,.16); background:#f7f5f2; color:#1e293b;
      padding:0 12px; font-family:'Barlow Condensed', sans-serif; font-size:.9rem; font-weight:700; white-space:nowrap;
    }
    .template-btn.primary { background:rgba(34,197,94,.14); border-color:rgba(22,163,74,.32); color:#166534; }
    .template-btn.accent { background:rgba(249,115,22,.1); border-color:rgba(249,115,22,.35); color:#c2410c; }
    .template-btn.ghost { border-color:rgba(239,68,68,.35); background:transparent; color:#dc2626; }
    .template-btn[disabled] { opacity:.45; cursor:default; }
    .template-select {
      height:34px; min-width:190px; max-width:240px; border-radius:9px;
      border:1px solid rgba(30,41,59,.16); background:#f7f5f2; color:#1e293b;
      padding:0 10px; outline:none; font-family:'Barlow Condensed', sans-serif; font-size:.9rem; font-weight:700;
    }
    .template-select:focus { border-color:var(--acc); }
    .modal-backdrop {
      position:fixed; inset:0; background:rgba(15,23,42,.34); display:flex; align-items:center; justify-content:center;
      padding:14px; z-index:40;
    }
    .modal-card {
      width:min(760px, 100%); max-height:min(92vh, 900px); overflow:auto; background:#fff; border:1px solid rgba(30,41,59,.12);
      border-radius:18px; box-shadow:0 16px 40px rgba(15,23,42,.22); padding:14px;
    }
    .modal-head { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:10px; }
    .modal-title { font-family:'Barlow Condensed', sans-serif; font-size:1.1rem; font-weight:800; letter-spacing:.04em; text-transform:uppercase; }
    .modal-sub { color:var(--muted); font-size:.82rem; margin-top:3px; }
    .modal-close {
      height:34px; min-width:34px; border-radius:10px; border:1px solid rgba(30,41,59,.16); background:#f7f5f2; color:#1e293b;
      font-family:'Barlow Condensed', sans-serif; font-size:1rem; font-weight:700;
    }
    .template-name-row { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .template-name-row input {
      flex:1; height:36px; background:#f7f5f2; border:1px solid rgba(30,41,59,.18); color:#1e293b; border-radius:8px; outline:none; padding:0 10px;
    }
    .template-name-row input:focus { border-color:var(--acc); }
    .saved-teams-list { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; max-height:84px; overflow:auto; }
    .saved-team-chip {
      height:30px; border-radius:999px; border:1px solid rgba(30,41,59,.14); background:#f7f5f2; color:#1e293b;
      padding:0 12px; font-family:'Barlow Condensed', sans-serif; font-weight:700;
    }
    .saved-team-chip.active { background:rgba(249,115,22,.1); border-color:rgba(249,115,22,.35); color:#c2410c; }
    .template-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:8px; }
    .template-row { display:grid; grid-template-columns:40px 72px 1fr; gap:8px; align-items:center; background:#f7f5f2; border:1px solid rgba(30,41,59,.08); border-radius:12px; padding:8px; }
    .template-slot { text-align:center; font-family:'Barlow Condensed', sans-serif; font-size:.95rem; font-weight:800; color:#64748b; }
    .template-row input {
      height:34px; background:#fff; border:1px solid rgba(30,41,59,.14); color:#1e293b; border-radius:8px; outline:none; padding:0 9px; min-width:0;
    }
    .template-row input:focus { border-color:var(--acc); }
    .modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:12px; flex-wrap:wrap; }

    .bottombar {
      background:#ffffff; border-top:1px solid rgba(30,41,59,.12); padding:8px 10px;
      display:flex; align-items:center; gap:8px;
    }
    .btn {
      height:34px; border-radius:9px; border:1px solid rgba(249,115,22,.35); background:rgba(249,115,22,.08); color:#c2410c;
      padding:0 12px; font-family:'Barlow Condensed', sans-serif; font-size:.9rem; font-weight:700;
    }
    .btn[disabled] { opacity:.45; cursor:default; }
    .btn.ghost { border-color:rgba(239,68,68,.35); background:transparent; color:#dc2626; }
    .hint { margin-left:auto; font-size:.73rem; color:var(--muted); text-align:right; }
    .hint b { color:#2563eb; }

    @media (max-width: 1180px) and (orientation: portrait),
           (max-width: 900px) {
      html, body, #root { overflow:auto; }
      .app { height:auto; min-height:100%; }
      .content { grid-template-columns:1fr; overflow:auto; }
      .stats-grid { grid-template-columns:repeat(3,minmax(135px,1fr)); width:100%; }
      .jerseys-grid { min-height:340px; }
    }
    @media (min-width: 901px) and (max-width: 1366px) and (orientation: landscape) {
      html, body, #root { overflow:hidden; height:100%; }
      .app { height:100vh; min-height:100vh; }
      .content {
        grid-template-columns:minmax(0, 1.45fr) minmax(320px, 0.9fr);
        gap:10px;
        overflow:hidden;
        align-items:stretch;
      }
      .left-panel, .right-panel, .stats-wrap, .right-panel-box { min-height:0; }
      .stats-wrap {
        overflow:auto;
        align-items:stretch;
      }
      .stats-grid {
        width:100%;
        grid-template-columns:repeat(4, minmax(0, 1fr));
        gap:8px;
        align-content:start;
      }
      .stat-card, .stat-card.compact, .stat-shoot { min-height:132px; }
      .right-panel-box { overflow:hidden; }
      .jerseys-grid {
        grid-template-columns:repeat(2, minmax(130px, 1fr));
        gap:10px;
        min-height:0;
        overflow:auto;
      }
      .jersey-svg { height:92px; }
      .jersey-number {
        top:30px;
        font-size:1.8rem;
      }
      .jersey-name-on-shirt {
        top:59px;
        width:72px;
        font-size:0.68rem;
      }
      .selected-banner { padding:8px 10px; }
      .selected-name { font-size:1rem; }
      .selected-help { font-size:0.72rem; }
    }
    @media (min-width: 861px) and (max-height: 930px) {
      .topbar { padding:6px 10px; }
      .score-strip { min-height:46px; padding:5px 10px; }
      .strip-score { font-size:1.9rem; }
      .content { padding:8px; gap:8px; }
      .left-panel, .right-panel { gap:8px; }
      .stats-wrap, .right-panel-box { padding:8px; }
      .stats-grid { gap:8px; grid-template-columns:repeat(4, minmax(112px, 1fr)); }
      .stat-card, .stat-card.compact, .stat-shoot { min-height:138px; }
      .stat-title { font-size:.92rem; }
      .stat-value { font-size:1.65rem; }
      .stat-sub { font-size:.66rem; }
      .stat-shoot .stat-icon { width:82px; height:48px; margin:4px auto 1px; }
      .compact-visual { height:52px; width:88px; }
      .compact-btn, .compact-btn.single, .shoot-btn { height:42px; }
      .compact-btn span:last-child { font-size:1.35rem; }
      .selected-name { font-size:1.02rem; }
      .selected-help { font-size:.72rem; }
    }
    @media (max-width: 860px) {
      html, body, #root { overflow:auto; }
      .app { height:auto; min-height:100%; }
      .topbar { flex-wrap:wrap; }
      .topbar-fields { flex-wrap:wrap; }
      .timer-zone { margin-left:0; }
      .template-tools { width:100%; }
      .template-select { min-width:0; flex:1 1 180px; max-width:none; }

function App(){
  const [players, setPlayers] = useState(buildPlayers());
  const [playerStats, setPlayerStats] = useState(() => initPlayerStats(buildPlayers()));
  const [selectedPlayerId, setSelectedPlayerId] = useState('p1');
  const [matchDate, setMatchDate] = useState('');
  const [matchTeams, setMatchTeams] = useState('');
  const [matchScore, setMatchScore] = useState('');
  const [quarterTimes, setQuarterTimes] = useState(initQuarterTimes());
  const [currentQ, setCurrentQ] = useState('QT1');
  const [timerSec, setTimerSec] = useState(0);
  const [timerRunning, setTimerRunning] = useState(false);
  const [notice, setNotice] = useState('');
  const [teamTemplates, setTeamTemplates] = useState([]);
  const [selectedTeamTemplateId, setSelectedTeamTemplateId] = useState('');
  const [teamModalOpen, setTeamModalOpen] = useState(false);
  const [teamDraftId, setTeamDraftId] = useState('');
  const [teamDraftName, setTeamDraftName] = useState('');
  const [teamDraftPlayers, setTeamDraftPlayers] = useState(() => sanitizeTemplatePlayers(buildPlayers()));

  const timerRef = useRef(null);
  const timerSecRef = useRef(0);
  const currentQRef = useRef('QT1');
  const quarterTimesRef = useRef(initQuarterTimes());
  const historyRef = useRef([]);

  useEffect(() => { timerSecRef.current = timerSec; }, [timerSec]);
  useEffect(() => { currentQRef.current = currentQ; }, [currentQ]);
  useEffect(() => { quarterTimesRef.current = quarterTimes; }, [quarterTimes]);

  const softVibrate = useCallback(ms => {
    if (navigator.vibrate) navigator.vibrate(ms || 10);
  }, []);

  const snapshotState = useCallback(() => ({
    players: deepClone(players),
    playerStats: deepClone(playerStats),
    selectedPlayerId,
    matchDate, matchTeams, matchScore,
    quarterTimes: deepClone(quarterTimes),
    currentQ, timerSec
  }), [players, playerStats, selectedPlayerId, matchDate, matchTeams, matchScore, quarterTimes, currentQ, timerSec]);

  const pushHistory = useCallback(() => {
    historyRef.current.push(snapshotState());
    if (historyRef.current.length > 80) historyRef.current.shift();
  }, [snapshotState]);

  const flashNotice = useCallback(msg => {
    setNotice(msg);
    window.clearTimeout(flashNotice.tid);
    flashNotice.tid = window.setTimeout(() => setNotice(''), 1400);
  }, []);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const saved = JSON.parse(raw);
      if (Array.isArray(saved.players) && saved.players.length) setPlayers(saved.players.map((p, i) => ({...p, onCourt: typeof p.onCourt === 'boolean' ? p.onCourt : i < 5})));
      if (saved.playerStats) {
        const upgraded = deepClone(saved.playerStats);
        Object.keys(upgraded).forEach(pid => {
          if (!upgraded[pid].quarterStats) upgraded[pid].quarterStats = initQuarterCounters();
          if (!upgraded[pid].playTime) upgraded[pid].playTime = initPlayerTimes();
          if (!upgraded[pid].playTime.quarterTimes) upgraded[pid].playTime.quarterTimes = initQuarterTimes();
        });
        setPlayerStats(upgraded);
      }
      if (saved.selectedPlayerId) setSelectedPlayerId(saved.selectedPlayerId);
      if (typeof saved.matchDate === 'string') setMatchDate(saved.matchDate);
      if (typeof saved.matchTeams === 'string') setMatchTeams(saved.matchTeams);
      if (typeof saved.matchScore === 'string') setMatchScore(saved.matchScore);
      if (saved.quarterTimes) setQuarterTimes(saved.quarterTimes);
      if (saved.currentQ) setCurrentQ(saved.currentQ);
      if (typeof saved.timerSec === 'number') setTimerSec(saved.timerSec);
      const rawTemplates = localStorage.getItem(TEAM_TEMPLATES_KEY);
      if (rawTemplates) {
        const parsedTemplates = JSON.parse(rawTemplates);
        if (Array.isArray(parsedTemplates)) {
          const cleanTemplates = parsedTemplates.map((tpl, i) => ({
            id: typeof tpl.id === 'string' && tpl.id ? tpl.id : 'team-' + (i + 1),
            name: typeof tpl.name === 'string' ? tpl.name : '',
            players: sanitizeTemplatePlayers(tpl.players)
          })).filter(tpl => tpl.name.trim() || tpl.players.some(p => (p.name || '').trim() || (p.number || '').trim()));
          setTeamTemplates(cleanTemplates);
          if (cleanTemplates[0]) setSelectedTeamTemplateId(cleanTemplates[0].id);
        }
      } else {
        const rawLegacyTemplate = localStorage.getItem(LEGACY_TEAM_TEMPLATE_KEY);
        if (rawLegacyTemplate) {
          const parsedTemplate = JSON.parse(rawLegacyTemplate);
          const migratedTemplate = {
            id: 'team-1',
            name: typeof parsedTemplate.name === 'string' ? parsedTemplate.name : 'Équipe 1',
            players: sanitizeTemplatePlayers(parsedTemplate.players)
          };
          if (migratedTemplate.name.trim() || migratedTemplate.players.some(p => (p.name || '').trim() || (p.number || '').trim())) {
            setTeamTemplates([migratedTemplate]);
            setSelectedTeamTemplateId(migratedTemplate.id);
          }
        }
      }
    } catch (err) {}
  }, []);

  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({players, playerStats, selectedPlayerId, matchDate, matchTeams, matchScore, quarterTimes, currentQ, timerSec}));
    } catch (err) {}
  }, [players, playerStats, selectedPlayerId, matchDate, matchTeams, matchScore, quarterTimes, currentQ, timerSec]);

  useEffect(() => {
    try {
      localStorage.setItem(TEAM_TEMPLATES_KEY, JSON.stringify(teamTemplates));
      localStorage.removeItem(LEGACY_TEAM_TEMPLATE_KEY);
    } catch (err) {}
  }, [teamTemplates]);

  useEffect(() => {
    if (selectedTeamTemplateId && !teamTemplates.some(t => t.id === selectedTeamTemplateId)) {
      setSelectedTeamTemplateId(teamTemplates[0] ? teamTemplates[0].id : '');
    }
  }, [teamTemplates, selectedTeamTemplateId]);

  useEffect(() => () => {
    if (timerRef.current) clearInterval(timerRef.current);
  }, []);

  useEffect(() => {
    if (!timerRunning) return;
    setPlayerStats(prev => {
      let changed = false;
      const next = deepClone(prev);
      players.forEach(p => {
        if (!p.onCourt) return;
        if (!next[p.id]) next[p.id] = { totals:{...INIT_COUNTERS}, quarterStats:initQuarterCounters(), playTime:initPlayerTimes() };
        if (!next[p.id].playTime) next[p.id].playTime = initPlayerTimes();
        if (!next[p.id].playTime.quarterTimes) next[p.id].playTime.quarterTimes = initQuarterTimes();
        next[p.id].playTime.total += 1;
        next[p.id].playTime.quarterTimes[currentQ] = (next[p.id].playTime.quarterTimes[currentQ] || 0) + 1;
        changed = true;
      });
      return changed ? next : prev;
    });
  }, [timerSec, timerRunning, players, currentQ]);

  const startTimer = useCallback(() => {
    if (timerRef.current) return;
    timerRef.current = setInterval(() => setTimerSec(s => s + 1), 1000);
    setTimerRunning(true);
  }, []);
  const pauseTimer = useCallback(() => {
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
    setTimerRunning(false);
  }, []);
  const toggleTimer = useCallback(() => {
    timerRef.current ? pauseTimer() : startTimer();
  }, [startTimer, pauseTimer]);
  const resetTimer = useCallback(() => {
    pushHistory();
    setTimerSec(0);
    setQuarterTimes(qt => ({...qt, [currentQRef.current]:0}));
    softVibrate(8);
  }, [pushHistory, softVibrate]);
  const changeQuarter = useCallback((newQ) => {
    pushHistory();
    setQuarterTimes(prev => ({...prev, [currentQRef.current]: timerSecRef.current}));
    pauseTimer();
    setCurrentQ(newQ);
    setTimerSec(quarterTimesRef.current[newQ] || 0);
  }, [pushHistory, pauseTimer]);

  const playersOnCourtCount = useMemo(() => players.filter(p => p.onCourt).length, [players]);

  const toggleOnCourt = useCallback((playerId) => {
    const player = players.find(p => p.id === playerId);
    if (!player) return;
    if (!player.onCourt && playersOnCourtCount >= 5) {
      flashNotice('5 joueurs max sur le terrain');
      softVibrate([18, 30, 18]);
      return;
    }
    pushHistory();
    setPlayers(prev => prev.map(p => p.id === playerId ? {...p, onCourt: !p.onCourt} : p));
    flashNotice(player.onCourt ? 'Joueur sorti' : 'Joueur entré');
    softVibrate(12);
  }, [players, playersOnCourtCount, pushHistory, flashNotice, softVibrate]);

  const setPlayerOnCourtState = useCallback((playerId, shouldBeOnCourt) => {
    const player = players.find(p => p.id === playerId);
    if (!player || player.onCourt === shouldBeOnCourt) return;
    if (shouldBeOnCourt && playersOnCourtCount >= 5) {
      flashNotice('5 joueurs max sur le terrain');
      softVibrate([18, 30, 18]);
      return;
    }
    pushHistory();
    setPlayers(prev => prev.map(p => p.id === playerId ? {...p, onCourt: shouldBeOnCourt} : p));
    flashNotice(shouldBeOnCourt ? 'Joueur entré' : 'Joueur sorti');
    softVibrate(12);
  }, [players, playersOnCourtCount, pushHistory, flashNotice, softVibrate]);

  const selectedPlayer = players.find(p => p.id === selectedPlayerId) || players[0];
  const selectedStats = playerStats[selectedPlayerId] || { totals:{...INIT_COUNTERS}, quarterStats:initQuarterCounters(), playTime:initPlayerTimes() };
  const counters = selectedStats.totals;

  const ensureSelected = useCallback(() => {
    if (!selectedPlayerId) {
      flashNotice('Sélectionne un maillot');
      return false;
    }
    return true;
  }, [selectedPlayerId, flashNotice]);

  const applyDelta = useCallback((recipe) => {
    if (!ensureSelected()) return;
    pushHistory();
    setPlayerStats(prev => {
      const next = deepClone(prev);
      if (!next[selectedPlayerId]) next[selectedPlayerId] = { totals:{...INIT_COUNTERS}, quarterStats:initQuarterCounters(), playTime:initPlayerTimes() };
      if (!next[selectedPlayerId].playTime) next[selectedPlayerId].playTime = initPlayerTimes();
      const totals = next[selectedPlayerId].totals;
      const quarter = next[selectedPlayerId].quarterStats[currentQRef.current] || {...INIT_COUNTERS};
      recipe(totals, quarter);
      next[selectedPlayerId].quarterStats[currentQRef.current] = quarter;
      return next;
    });
    softVibrate(10);
  }, [selectedPlayerId, ensureSelected, pushHistory, softVibrate]);

  const addShot = useCallback((type, made) => {
    const map = {
      two:['twoAttempted','twoMade'],
      three:['threeAttempted','threeMade'],
      ft:['ftAttempted','ftMade']
    };
    const pair = map[type];
    applyDelta((totals, quarter) => {
      totals[pair[0]] += 1;
      quarter[pair[0]] += 1;
      if (made) {
        totals[pair[1]] += 1;
        quarter[pair[1]] += 1;
      }
    });
  }, [applyDelta]);

  const addOne = useCallback((key) => {
    applyDelta((totals, quarter) => {
      totals[key] += 1;
      quarter[key] += 1;
    });
  }, [applyDelta]);

  const handleUndo = useCallback(() => {
    const prev = historyRef.current.pop();
    if (!prev) return;
    pauseTimer();
    setPlayers(prev.players || buildPlayers());
    setPlayerStats(prev.playerStats || initPlayerStats(prev.players || buildPlayers()));
    setSelectedPlayerId(prev.selectedPlayerId || 'p1');
    setMatchDate(prev.matchDate || '');
    setMatchTeams(prev.matchTeams || '');
    setMatchScore(prev.matchScore || '');
    setQuarterTimes(prev.quarterTimes || initQuarterTimes());
    setCurrentQ(prev.currentQ || 'QT1');
    setTimerSec(prev.timerSec || 0);
    softVibrate(10);
  }, [pauseTimer, softVibrate]);

  const handleReset = useCallback(() => {
    if (!window.confirm('Réinitialiser toutes les statistiques du match ?')) return;
    pushHistory();
    setPlayerStats(initPlayerStats(players.map((p, i) => ({...p, onCourt:i < 5}))));
    setPlayers(prev => prev.map((p, i) => ({...p, onCourt:i < 5})));
    setQuarterTimes(initQuarterTimes());
    setCurrentQ('QT1');
    setTimerSec(0);
    pauseTimer();
    softVibrate(18);
  }, [players, pushHistory, pauseTimer, softVibrate]);

  const updatePlayerField = useCallback((playerId, field, value) => {
    setPlayers(prev => prev.map(p => p.id === playerId ? {...p, [field]: value} : p));
  }, []);

  const selectedTeamTemplate = useMemo(() => teamTemplates.find(t => t.id === selectedTeamTemplateId) || null, [teamTemplates, selectedTeamTemplateId]);
  const hasSavedTemplate = useMemo(() => teamTemplates.length > 0, [teamTemplates]);
  const handleSelectTeamTemplate = useCallback((templateId) => {
    setSelectedTeamTemplateId(templateId);
  }, []);

  const openTeamModal = useCallback((templateId = '') => {
    const chosenTemplate = teamTemplates.find(t => t.id === templateId) || null;
    const sourcePlayers = chosenTemplate ? chosenTemplate.players : players;
    setTeamDraftId(chosenTemplate ? chosenTemplate.id : '');
    setTeamDraftName(chosenTemplate ? chosenTemplate.name : '');
    setTeamDraftPlayers(sanitizeTemplatePlayers(sourcePlayers));
    setTeamModalOpen(true);
  }, [teamTemplates, players]);

  const closeTeamModal = useCallback(() => {
    setTeamModalOpen(false);
    setTeamDraftId('');
  }, []);

  const updateTeamDraftField = useCallback((playerId, field, value) => {
    setTeamDraftPlayers(prev => prev.map(p => p.id === playerId ? {...p, [field]: value} : p));
  }, []);

  const saveTeamTemplate = useCallback(() => {
    const payload = {
      id: teamDraftId || ('team-' + Date.now()),
      name: (teamDraftName || '').trim().slice(0, 30),
      players: sanitizeTemplatePlayers(teamDraftPlayers)
    };
    if (!payload.name) {
      flashNotice("Donne un nom à l'équipe");
      softVibrate([18, 30, 18]);
      return;
    }
    setTeamTemplates(prev => {
      const exists = prev.some(t => t.id === payload.id);
      return exists ? prev.map(t => t.id === payload.id ? payload : t) : [...prev, payload];
    });
    setSelectedTeamTemplateId(payload.id);
    setTeamModalOpen(false);
    setTeamDraftId('');
    flashNotice('Équipe ' + payload.name + ' enregistrée');
    softVibrate(12);
  }, [teamDraftId, teamDraftName, teamDraftPlayers, flashNotice, softVibrate]);

  const deleteTeamTemplate = useCallback(() => {
    if (!teamDraftId) return;
    const target = teamTemplates.find(t => t.id === teamDraftId);
    if (!target) return;
    if (!window.confirm("Supprimer l'équipe " + (target.name || '') + ' ?')) return;
    const remaining = teamTemplates.filter(t => t.id !== teamDraftId);
    setTeamTemplates(remaining);
    if (selectedTeamTemplateId === teamDraftId) {
      setSelectedTeamTemplateId(remaining[0] ? remaining[0].id : '');
    }
    setTeamDraftId('');
    setTeamDraftName('');
    setTeamDraftPlayers(sanitizeTemplatePlayers(buildPlayers()));
    flashNotice('Équipe supprimée');
    softVibrate(12);
  }, [teamDraftId, teamTemplates, selectedTeamTemplateId, flashNotice, softVibrate]);

  const applyTeamTemplate = useCallback(() => {
    if (!selectedTeamTemplate) {
      flashNotice("Crée d'abord une équipe");
      softVibrate([18, 30, 18]);
      return;
    }
    pushHistory();
    setPlayers(prev => prev.map((p, i) => ({
      ...p,
      number: (((selectedTeamTemplate.players || [])[i] || {}).number || ''),
      name: (((selectedTeamTemplate.players || [])[i] || {}).name || '')
    })));
    flashNotice('Équipe ' + selectedTeamTemplate.name + ' chargée');
    softVibrate(12);
  }, [selectedTeamTemplate, pushHistory, flashNotice, softVibrate]);

  const qLabel = q => ({QT1:'QT 1',QT2:'QT 2',QT3:'QT 3',QT4:'QT 4',OT:'Prolongation'}[q] || q);

  const playerDisplayName = p => {
    const num = (p.number || '').trim();
    const name = (p.name || '').trim();
    if (name && num) return '#' + num + ' ' + name;
    if (name) return name;
    if (num) return '#' + num;
    return 'Maillot';
  };

  const calcSummary = useCallback((playerId) => {
    const p = playerStats[playerId] || { totals:{...INIT_COUNTERS}, quarterStats:initQuarterCounters() };
    const c = p.totals;
    return {
      pts: c.twoMade*2 + c.threeMade*3 + c.ftMade,
      reb: c.reboundsOff + c.reboundsDef,
      def: c.interceptions + c.blocks,
      misc: c.turnovers + c.fouls,
      counters: c,
      quarterStats: p.quarterStats,
      playTime: p.playTime || initPlayerTimes()
    };
  }, [playerStats]);

  const activeSummary = calcSummary(selectedPlayerId);

  const filledPlayers = useMemo(() => players.filter(p => (p.name || '').trim() || (p.number || '').trim() || (playerStats[p.id] && Object.values(playerStats[p.id].totals).some(v => v))), [players, playerStats]);

  const buildCsv = useCallback(() => {
    const qt = {...quarterTimes, [currentQ]: timerSec};
    const lines = [];
    lines.push(['Date', matchDate || '', 'Équipes', matchTeams || '', 'Score', matchScore || ''].join(';'));
    lines.push('');
    lines.push(['Joueur','Numéro','Temps','PTS','2P marqués','2P tentés','%2P','3P marqués','3P tentés','%3P','LF marqués','LF tentés','%LF','RO','RD','PDS','INT','CTR','BP','F'].join(';'));
    filledPlayers.forEach(p => {
      const summary = calcSummary(p.id);
      const s = summary.counters;
      const pts = s.twoMade*2 + s.threeMade*3 + s.ftMade;
      lines.push([
        '"'+(p.name || '')+'"',
        '"'+(p.number || '')+'"',
        fmt(summary.playTime.total || 0),
        pts,
        s.twoMade, s.twoAttempted, pct(s.twoMade, s.twoAttempted),
        s.threeMade, s.threeAttempted, pct(s.threeMade, s.threeAttempted),
        s.ftMade, s.ftAttempted, pct(s.ftMade, s.ftAttempted),
        s.reboundsOff, s.reboundsDef, s.assists, s.interceptions, s.blocks, s.turnovers, s.fouls
      ].join(';'));
    });
    lines.push('');
    lines.push(['Détail par quart-temps','','','','','','','','','','','','','','','','','',''].join(';'));
    lines.push(['Joueur','Période','Temps','PTS','2M','2T','3M','3T','LFM','LFT','RO','RD','PDS','INT','CTR','BP','F','',''].join(';'));
    filledPlayers.forEach(p => {
      const detail = playerStats[p.id] ? playerStats[p.id].quarterStats : initQuarterCounters();
      Q_KEYS.forEach(q => {
        const row = detail[q] || {...INIT_COUNTERS};
        const pts = row.twoMade*2 + row.threeMade*3 + row.ftMade;
        const playTime = ((playerStats[p.id] && playerStats[p.id].playTime && playerStats[p.id].playTime.quarterTimes[q]) || 0);
        lines.push([
          '"'+playerDisplayName(p)+'"', qLabel(q), fmt(playTime), pts,
          row.twoMade, row.twoAttempted, row.threeMade, row.threeAttempted, row.ftMade, row.ftAttempted,
          row.reboundsOff, row.reboundsDef, row.assists, row.interceptions, row.blocks, row.turnovers, row.fouls,'',''
        ].join(';'));
      });
    });
    return lines.join('\n');
  }, [filledPlayers, playerStats, quarterTimes, currentQ, timerSec, matchDate, matchTeams, matchScore]);

  const buildHtml = useCallback(() => {
    const qt = {...quarterTimes, [currentQ]: timerSec};
    let h = '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Stats match</title><style>'+
      'body{font-family:Arial,sans-serif;padding:18px;color:#111}h1,h2{margin:0 0 12px}table{border-collapse:collapse;width:100%;margin:12px 0 22px}th,td{border:1px solid #d1d5db;padding:6px 8px;text-align:center}th{background:#f97316;color:#fff}td:first-child,td:nth-child(2){text-align:left}.meta td{border:none;padding:3px 0;text-align:left}.pc{font-weight:bold;background:#f3f4f6}</style></head><body>';
    h += '<h1>Statistiques du match</h1>';
    h += '<table class="meta"><tr><td><b>Date</b></td><td>'+esc(matchDate)+'</td></tr><tr><td><b>Équipes</b></td><td>'+esc(matchTeams)+'</td></tr><tr><td><b>Score</b></td><td>'+esc(matchScore)+'</td></tr></table>';
    h += '<h2>Résumé par joueur</h2><table><tr><th>Joueur</th><th>N°</th><th>Temps</th><th>PTS</th><th>2M</th><th>2T</th><th>% 2P</th><th>3M</th><th>3T</th><th>% 3P</th><th>LFM</th><th>LFT</th><th>% LF</th><th>RO</th><th>RD</th><th>PDS</th><th>INT</th><th>CTR</th><th>BP</th><th>F</th></tr>';
    filledPlayers.forEach(p => {
      const summary = calcSummary(p.id);
      const s = summary.counters;
      h += '<tr><td>'+esc(p.name || '')+'</td><td>'+esc(p.number || '')+'</td><td>'+fmt(summary.playTime.total || 0)+'</td><td>'+(s.twoMade*2+s.threeMade*3+s.ftMade)+'</td><td>'+s.twoMade+'</td><td>'+s.twoAttempted+'</td><td>'+esc(pct(s.twoMade,s.twoAttempted))+'</td><td>'+s.threeMade+'</td><td>'+s.threeAttempted+'</td><td>'+esc(pct(s.threeMade,s.threeAttempted))+'</td><td>'+s.ftMade+'</td><td>'+s.ftAttempted+'</td><td>'+esc(pct(s.ftMade,s.ftAttempted))+'</td><td>'+s.reboundsOff+'</td><td>'+s.reboundsDef+'</td><td>'+s.assists+'</td><td>'+s.interceptions+'</td><td>'+s.blocks+'</td><td>'+s.turnovers+'</td><td>'+s.fouls+'</td></tr>';
    });
    h += '</table>';
    filledPlayers.forEach(p => {
      const detail = playerStats[p.id] ? playerStats[p.id].quarterStats : initQuarterCounters();
      h += '<h2>'+esc(playerDisplayName(p))+'</h2><table><tr><th>Période</th><th>Temps</th><th>PTS</th><th>2M</th><th>2T</th><th>3M</th><th>3T</th><th>LFM</th><th>LFT</th><th>RO</th><th>RD</th><th>PDS</th><th>INT</th><th>CTR</th><th>BP</th><th>F</th></tr>';
      Q_KEYS.forEach(q => {
        const row = detail[q] || {...INIT_COUNTERS};
        const pts = row.twoMade*2 + row.threeMade*3 + row.ftMade;
        const playTime = ((playerStats[p.id] && playerStats[p.id].playTime && playerStats[p.id].playTime.quarterTimes[q]) || 0);
        h += '<tr><td class="pc">'+esc(qLabel(q))+'</td><td>'+fmt(playTime)+'</td><td>'+pts+'</td><td>'+row.twoMade+'</td><td>'+row.twoAttempted+'</td><td>'+row.threeMade+'</td><td>'+row.threeAttempted+'</td><td>'+row.ftMade+'</td><td>'+row.ftAttempted+'</td><td>'+row.reboundsOff+'</td><td>'+row.reboundsDef+'</td><td>'+row.assists+'</td><td>'+row.interceptions+'</td><td>'+row.blocks+'</td><td>'+row.turnovers+'</td><td>'+row.fouls+'</td></tr>';
      });
      h += '</table>';
    });
    return h + '</body></html>';
  }, [filledPlayers, calcSummary, playerStats, quarterTimes, currentQ, timerSec, matchDate, matchTeams, matchScore]);

  const handleCopy = useCallback(() => {
    const csv = buildCsv();
    copyText(csv).then(() => flashNotice('CSV copié')).catch(() => window.prompt('Copie le CSV :', csv));
  }, [buildCsv, flashNotice]);

  const shootCards = [
    {key:'two', title:'2', label:'2 Points'},
    {key:'three', title:'3', label:'3 Points'},
    {key:'ft', title:'LF', label:'L. Francs'}
  ];

  const selectedCardData = {
    two: { value: activeSummary.counters.twoMade*2, sub: activeSummary.counters.twoMade + '/' + activeSummary.counters.twoAttempted + ' · ' + pctMini(activeSummary.counters.twoMade, activeSummary.counters.twoAttempted) },
    three: { value: activeSummary.counters.threeMade*3, sub: activeSummary.counters.threeMade + '/' + activeSummary.counters.threeAttempted + ' · ' + pctMini(activeSummary.counters.threeMade, activeSummary.counters.threeAttempted) },
    ft: { value: activeSummary.counters.ftMade, sub: activeSummary.counters.ftMade + '/' + activeSummary.counters.ftAttempted + ' · ' + pctMini(activeSummary.counters.ftMade, activeSummary.counters.ftAttempted) }
  };

  return e('div', {className:'app'},
    e('div', {className:'topbar'},
      e('div', {className:'logo'}, '⬡ STATS'),
      e('div', {className:'topbar-fields'},
        e('input', {className:'inp-teams', type:'text', placeholder:'Équipe A - Équipe B', value:matchTeams, onChange:ev=>setMatchTeams(ev.target.value), autoComplete:'off'}),
        e('input', {className:'inp-date', type:'date', value:matchDate, onChange:ev=>setMatchDate(ev.target.value)}),
        e('input', {className:'inp-score', type:'text', placeholder:'Score final', value:matchScore, onChange:ev=>setMatchScore(ev.target.value), autoComplete:'off'})
      ),
      e('div', {className:'template-tools'},
        e('button', {className:'template-btn accent', onClick:()=>openTeamModal()}, 'Créer équipe'),
        e('select', {
          className:'template-select',
          value:selectedTeamTemplateId,
          onChange:ev=>handleSelectTeamTemplate(ev.target.value),
          disabled:!hasSavedTemplate
        }, [
          e('option', {key:'__placeholder__', value:''}, hasSavedTemplate ? 'Choisir une équipe' : 'Aucune équipe enregistrée')
        ].concat(teamTemplates.map(t => e('option', {key:t.id, value:t.id}, t.name || 'Équipe sans nom')))),
        e('button', {className:'template-btn primary', onClick:applyTeamTemplate, disabled:!selectedTeamTemplate}, 'Charger'),
        e('button', {className:'template-btn', onClick:()=>openTeamModal(selectedTeamTemplateId), disabled:!selectedTeamTemplate}, 'Modifier')
      ),
      e('div', {className:'timer-zone'},
        e('select', {value:currentQ, onChange:ev=>changeQuarter(ev.target.value)}, Q_KEYS.map(q => e('option', {key:q, value:q}, q==='OT' ? 'OT' : 'QT'+q.slice(2)))),
        e('div', {className:'timer-box'}, fmt(timerSec)),
        e('button', {className:'timer-btn ' + (timerRunning ? 'pause':'play'), onClick:toggleTimer}, timerRunning ? '⏸ PAUSE' : '▶ START'),
        e('button', {className:'timer-btn', onClick:resetTimer}, '↺')
      )
    ),

    e('div', {className:'score-strip'},
      e('div', {className:'strip-main'},
        e('div', null,
          e('div', {className:'strip-title'}, 'Total points'),
          e('div', {className:'strip-score'}, activeSummary.pts)
        ),
        e('div', {className:'strip-player'}, playerDisplayName(selectedPlayer))
      ),
      e('div', {className:'strip-minis'},
        [['reb',activeSummary.reb,'REB'],['ast',activeSummary.counters.assists,'PSS'],['int',activeSummary.counters.interceptions,'INT'],['ctr',activeSummary.counters.blocks,'CTR'],['bp',activeSummary.counters.turnovers,'BP'],['f',activeSummary.counters.fouls,'FTS']]
          .map(([k,v,l]) => e('div', {className:'mini', key:k}, e('div',{className:'mini-v'}, v), e('div',{className:'mini-l'}, l)))
      )
    ),

    e('div', {className:'content'},
      e('div', {className:'left-panel'},
        e('div', {className:'selected-banner'},
          e('div', null,
            e('div', {className:'selected-label'}, 'Joueur sélectionné'),
            e('div', {className:'selected-name'}, playerDisplayName(selectedPlayer)),
            e('div', {className:'selected-label'}, 'Temps de jeu : ' + fmt((activeSummary.playTime && activeSummary.playTime.total) || 0))
          ),
          e('div', {className:'selected-help'}, notice || 'ON = entrée terrain · OFF = sortie · clic carte = sélection')
        ),
        e('div', {className:'stats-wrap'},
          e('div', {className:'stats-grid'},
            shootCards.map(card => e('div', {className:'stat-card stat-shoot', key:card.key, style:{'--accent':COLORS[card.key]}},
              e('div', {className:'shoot-actions'},
                e('button', {className:'shoot-btn plus', onClick:()=>addShot(card.key, true)}, '+'),
                e('button', {className:'shoot-btn minus', onClick:()=>addShot(card.key, false)}, '−')
              ),
              e('div', {className:'stat-icon', style:{'--accent':COLORS[card.key]}}, e(StatIcon, {src:ICONS[card.key]})),
              e('div', {className:'stat-title'}, card.title),
              e('div', {className:'stat-value'}, selectedCardData[card.key].value),
              e('div', {className:'stat-sub'}, selectedCardData[card.key].sub)
            )),
            e('div', {className:'stat-card compact', style:{'--accent':COLORS.reb}},
              e('div', {className:'stat-title', style:{marginTop:0}}, 'Rebonds'),
              e('div', {className:'compact-visual'}, e(StatIcon, {src:ICONS.reb})),
              e('div', {className:'compact-grid two-cols'},
                e('button', {className:'compact-btn', onClick:()=>addOne('reboundsOff')}, e('span', null, 'OFF'), e('span', null, counters.reboundsOff)),
                e('button', {className:'compact-btn', onClick:()=>addOne('reboundsDef')}, e('span', null, 'DEF'), e('span', null, counters.reboundsDef))
              )
            ),
            e('div', {className:'stat-card compact', style:{'--accent':COLORS.ast}},
              e('div', {className:'stat-title', style:{marginTop:0}}, 'Passes'),
              e('div', {className:'compact-visual'}, e(StatIcon, {src:ICONS.ast})),
              e('div', {className:'compact-grid'}, e('button', {className:'compact-btn single', onClick:()=>addOne('assists')}, e('span', null, 'PASSE'), e('span', null, counters.assists)))
            ),
            e('div', {className:'stat-card compact', style:{'--accent':COLORS.def}},
              e('div', {className:'stat-title', style:{marginTop:0}}, 'Défense'),
              e('div', {className:'compact-visual'}, e(StatIcon, {src:ICONS.def})),
              e('div', {className:'compact-grid two-cols'},
                e('button', {className:'compact-btn', onClick:()=>addOne('interceptions')}, e('span', null, 'INT'), e('span', null, counters.interceptions)),
                e('button', {className:'compact-btn', onClick:()=>addOne('blocks')}, e('span', null, 'CTR'), e('span', null, counters.blocks))
              )
            ),
            e('div', {className:'stat-card compact', style:{'--accent':COLORS.misc}},
              e('div', {className:'stat-title', style:{marginTop:0}}, 'Divers'),
              e('div', {className:'compact-visual'}, e(StatIcon, {src:ICONS.misc})),
              e('div', {className:'compact-grid two-cols'},
                e('button', {className:'compact-btn', onClick:()=>addOne('turnovers')}, e('span', null, 'BP'), e('span', null, counters.turnovers)),
                e('button', {className:'compact-btn', onClick:()=>addOne('fouls')}, e('span', null, 'F'), e('span', null, counters.fouls))
              )
            )
          )
        )
      ),

      e('div', {className:'right-panel'},
        e('div', {className:'right-panel-box'},
          e('div', {className:'panel-title'},
            e('span', null, 'Maillots joueurs'),
            e('small', null, playersOnCourtCount + '/5 sur le terrain · ON/OFF pour gérer les rotations')
          ),
          e('div', {className:'jerseys-grid'},
            players.map((p, idx) => e('div', {
              key:p.id,
              className:'jersey-card' + (selectedPlayerId === p.id ? ' selected' : '') + (p.onCourt ? ' on-court' : ''),
              onClick:()=>setSelectedPlayerId(p.id)
            },
              e('div', {className:'jersey-status'},
                e('button', {
                  type:'button',
                  className:'jersey-status-btn on' + (p.onCourt ? ' active' : ''),
                  onPointerDown:ev => {
                    ev.preventDefault();
                    ev.stopPropagation();
                    setPlayerOnCourtState(p.id, true);
                  },
                  onClick:ev => {
                    ev.preventDefault();
                    ev.stopPropagation();
                    setPlayerOnCourtState(p.id, true);
                  }
                }, 'ON'),
                e('button', {
                  type:'button',
                  className:'jersey-status-btn off' + (!p.onCourt ? ' active' : ''),
                  onPointerDown:ev => {
                    ev.preventDefault();
                    ev.stopPropagation();
                    setPlayerOnCourtState(p.id, false);
                  },
                  onClick:ev => {
                    ev.preventDefault();
                    ev.stopPropagation();
                    setPlayerOnCourtState(p.id, false);
                  }
                }, 'OFF')
              ),
              e('div', {className:'jersey-badge'}, idx+1),
              e('div', {className:'jersey-svg-wrap'},
                e(JerseySvg),
                e('div', {className:'jersey-number'}, (p.number || '').slice(0,2)),
                e('div', {className:'jersey-name-on-shirt'}, (p.name || '').trim())
              ),
              e('input', {
                className:'jersey-input', type:'text', inputMode:'numeric', maxLength:2, placeholder:'N°', value:p.number,
                onClick:ev=>ev.stopPropagation(),
                onChange:ev=>updatePlayerField(p.id,'number', ev.target.value.replace(/[^0-9]/g,'').slice(0,2))
              }),
              e('input', {
                className:'jersey-name', type:'text', maxLength:22, placeholder:'Nom', value:p.name,
                onClick:ev=>ev.stopPropagation(),
                onChange:ev=>updatePlayerField(p.id,'name', ev.target.value)
              }),
              e('div', {className:'jersey-time'},
                e('span', {className:'jersey-time-label'}, 'Temps'),
                fmt((((playerStats[p.id] || {}).playTime || {}).total) || 0)
              )
            ))
          )
        )
      )
    ),

    teamModalOpen && e('div', {className:'modal-backdrop', onClick:closeTeamModal},
      e('div', {className:'modal-card', onClick:ev=>ev.stopPropagation()},
        e('div', {className:'modal-head'},
          e('div', null,
            e('div', {className:'modal-title'}, 'Équipe type'),
            e('div', {className:'modal-sub'}, "Enregistre une bonne fois les noms et numéros, puis recharge l'équipe en un clic.")
          ),
          e('button', {className:'modal-close', type:'button', onClick:closeTeamModal}, '✕')
        ),
        hasSavedTemplate && e('div', {className:'saved-teams-list'},
          teamTemplates.map(t => e('button', {
            key:t.id,
            type:'button',
            className:'saved-team-chip' + (teamDraftId === t.id ? ' active' : ''),
            onClick:()=>openTeamModal(t.id)
          }, t.name || 'Équipe sans nom'))
        ),
        e('div', {className:'template-name-row'},
          e('input', {type:'text', maxLength:30, placeholder:"Nom de l'équipe", value:teamDraftName, onChange:ev=>setTeamDraftName(ev.target.value), autoComplete:'off'})
        ),
        e('div', {className:'template-grid'},
          teamDraftPlayers.map((p, idx) => e('div', {className:'template-row', key:p.id},
            e('div', {className:'template-slot'}, idx + 1),
            e('input', {type:'text', inputMode:'numeric', maxLength:2, placeholder:'N°', value:p.number, onChange:ev=>updateTeamDraftField(p.id,'number', ev.target.value.replace(/[^0-9]/g,'').slice(0,2))}),
            e('input', {type:'text', maxLength:22, placeholder:'Nom du joueur', value:p.name, onChange:ev=>updateTeamDraftField(p.id,'name', ev.target.value)})
          ))
        ),
        e('div', {className:'modal-actions'},
          teamDraftId && e('button', {className:'template-btn ghost', type:'button', onClick:deleteTeamTemplate}, 'Supprimer'),
          e('button', {className:'template-btn', type:'button', onClick:closeTeamModal}, 'Annuler'),
          e('button', {className:'template-btn accent', type:'button', onClick:saveTeamTemplate}, 'Enregistrer')
        )
      )
    ),

    e('div', {className:'bottombar'},
      e('button', {className:'btn', onClick:handleUndo, disabled:historyRef.current.length===0}, '↶ Annuler'),
      e('button', {className:'btn ghost', onClick:handleReset}, '↺ Réinitialiser'),
      e('button', {className:'btn', onClick:handleCopy}, 'Copier'),
      e('button', {className:'btn', onClick:()=>dlFile(buildCsv(), 'text/csv;charset=utf-8;', 'stats_match_'+(slugify(matchTeams)||'basket')+'.csv')}, 'CSV'),
      e('button', {className:'btn', onClick:()=>dlFile(buildHtml(), 'text/html;charset=utf-8;', 'stats_match_'+(slugify(matchTeams)||'basket')+'.html')}, 'Tableau HTML'),
      e('div', {className:'hint'}, e('b', null, 'Autosave ON'), ' · Temps de jeu inclus')
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
